[defaults]
inventory = inventory/hosts.yml
roles_path = roles
collections_path = collections
host_key_checking = False
retry_files_enabled = False
# Marks templated files (e.g. haproxy.cfg) so /etc/... shows Ansible template provenance
ansible_managed = Ansible managed — {file} — do not edit on host; change repo template and redeploy

[privilege_escalation]
become = True
become_method = sudo

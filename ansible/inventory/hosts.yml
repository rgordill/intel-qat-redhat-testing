---
# Example / fallback only. Real IPs and provider come from Terraform state.
#
# Generate inventory from the stack you applied:
#   ./scripts/terraform/render-ansible-inventory.sh libvirt
#   ./scripts/terraform/render-ansible-inventory.sh aws
# Then point Ansible at the generated file (gitignored), e.g.:
#   cd ansible && ansible-playbook -i inventory/hosts.auto.yml playbooks/deploy_benchmark.yml
#   # AWS: -i inventory/hosts.aws.auto.yml
# Or: export QAT_BENCH_INVENTORY=inventory/hosts.auto.yml
#
all:
  vars:
    provider: libvirt
    qatbench_vm_domain: "atik.demo"
    qatbench_client_fqdn: "bench-client.atik.demo"
    qatbench_server_fqdn: "bench-server.atik.demo"
  children:
    client:
      hosts:
        bench-client:
          ansible_host: CHANGE_ME_CLIENT_IP
          ansible_user: cloud-user
    server:
      hosts:
        bench-server:
          ansible_host: CHANGE_ME_SERVER_IP
          ansible_user: cloud-user

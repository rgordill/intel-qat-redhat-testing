---
# Set ansible_host to your libvirt or AWS IPs (see terraform outputs / virsh domifaddr).
all:
  children:
    client:
      hosts:
        bench-client:
          ansible_host: CHANGE_ME_CLIENT_IP
          ansible_user: cloud-user
    server:
      hosts:
        bench-server:
          ansible_host: CHANGE_ME_SERVER_IP
          ansible_user: cloud-user

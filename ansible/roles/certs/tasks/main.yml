---
# openssl(1) only — no python-cryptography. Produces:
# - ca.crt / ca.key — benchmark root CA
# - nginx.key / nginx.crt — CN=nginx, SAN nginx-passthrough.apps.<domain> (+ localhost / 127.0.0.1)
# - haproxy-wildcard.* + haproxy.pem — SAN *.apps.<domain> for HAProxy edge (crt-list default.pem)
- name: Ensure openssl is present
  ansible.builtin.package:
    name: openssl
    state: present

- name: Ensure certificate directory exists
  ansible.builtin.file:
    path: "{{ certs_role_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy OpenSSL configs for nginx and HAProxy leaf certificates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ certs_role_dir }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: openssl-nginx.cnf.j2, dest: openssl-nginx.cnf }
    - { src: openssl-haproxy-wildcard.cnf.j2, dest: openssl-haproxy-wildcard.cnf }

- name: Deploy certificate generation script
  ansible.builtin.template:
    src: generate-qatbench-certs.sh.j2
    dest: "{{ certs_role_dir }}/generate-qatbench-certs.sh"
    owner: root
    group: root
    mode: "0700"

- name: Generate CA, nginx cert, and HAProxy wildcard PEM
  ansible.builtin.command:
    cmd: "{{ certs_role_dir }}/generate-qatbench-certs.sh"
  changed_when: false

- name: Remove legacy single server cert filenames (replaced by nginx.crt / haproxy-wildcard.*)
  ansible.builtin.file:
    path: "{{ certs_role_dir }}/{{ item }}"
    state: absent
  loop:
    - openssl.cnf
    - server.key
    - server.crt
    - server.csr

- name: HAProxy PEM ownership
  ansible.builtin.file:
    path: "{{ certs_role_dir }}/haproxy.pem"
    owner: root
    group: root
    mode: "0600"

---
- name: Install HAProxy
  ansible.builtin.dnf:
    name: haproxy
    state: present

- name: Detect SELinux mode
  ansible.builtin.command:
    cmd: getenforce
  register: qatbench_getenforce
  changed_when: false

- name: Allow HAProxy to connect backends (SELinux)
  ansible.builtin.command:
    cmd: setsebool -P haproxy_connect_any on
  when: qatbench_getenforce.stdout == 'Enforcing'
  changed_when: true

- name: Deploy HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: haproxy -c -f %s
    backup: true
  notify: Reload haproxy

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: true

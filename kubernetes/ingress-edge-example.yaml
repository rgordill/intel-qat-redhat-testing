# Edge termination: HTTPS to Ingress → HTTP to Service (like scenarios b/c).
# Set host and TLS secret to match your cluster / cert-manager issuer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qat-bench-edge
  namespace: qat-bench
  annotations:
    route.openshift.io/termination: edge
    cert-manager.io/cluster-issuer: lab-ca-issuer
spec:
  ingressClassName: openshift-default
  tls:
    - hosts:
        - qat-bench.apps.example.com
      secretName: qat-bench-edge-tls
  rules:
    - host: qat-bench.apps.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qat-bench-nginx
                port:
                  number: 80

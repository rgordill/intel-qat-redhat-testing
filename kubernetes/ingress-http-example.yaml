# Plain HTTP to Service (scenario a). Set host to your Ingress DNS / Route.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qat-bench-http
  namespace: qat-bench
spec:
  ingressClassName: openshift-default
  rules:
    - host: qat-bench.apps.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qat-bench-nginx
                port:
                  number: 80
